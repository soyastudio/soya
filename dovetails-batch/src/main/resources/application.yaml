server:
  port: 7833

management:
  endpoints:
    web:
      exposure:
        include: "*"
hawtio:
  authenticationEnabled: false

spring:
  cache:
    cache-names: Event
    caffeine:
      spec: maximumSize=500, expireAfterAccess=300s

spring.quartz.properties:
  org.quartz.threadPool.threadCount: 15

soya.framework.dovetails:
  server:
    home: D:/dovetails
    configuration: D:/dovetails/conf/server.properties
    prefix: soya.framework.dovetails.